<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Keranjang Belanja</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f4f4f4;
      }

      .container {
        display: flex;
        gap: 20px;
        padding: 20px;
      }

      .produk {
        flex: 2;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
      }

      .card {
        background: white;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      .card img {
        width: 100%;
        border-radius: 5px;
      }

      button {
        margin-top: 5px;
        padding: 8px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #3498db;
        color: white;
      }

      .keranjang {
        flex: 1;
        background: white;
        padding: 15px;
        border-radius: 8px;
        height: fit-content;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      .item {
        border-bottom: 1px solid #ddd;
        padding: 8px 0;
      }

      .item button {
        padding: 3px 6px;
        margin: 2px;
      }

      .badge {
        background: red;
        color: white;
        padding: 2px 6px;
        border-radius: 50%;
        font-size: 12px;
      }

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Produk -->
      <div id="produk" class="produk"></div>

      <!-- Keranjang -->
      <div class="keranjang">
        <h3>Keranjang 🛒 <span id="badge" class="badge">0</span></h3>
        <div id="cart-list"></div>
        <h4>Total: Rp <span id="total">0</span></h4>
        <button id="checkout">Checkout</button>
      </div>
    </div>

    <script src="latihan-2.js"></script>
  </body>
</html>
