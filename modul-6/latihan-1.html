<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kalkulator Interaktif</title>

    <style>
      body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f4f4;
      }

      .kalkulator {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 220px;
      }

      .display {
        width: 100%;
        height: 50px;
        margin-bottom: 10px;
        text-align: right;
        font-size: 24px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background: #eee;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #3498db;
        color: white;
      }

      button.operator {
        background: #f39c12;
      }

      button.equal {
        background: #27ae60;
      }

      button.clear {
        background: #e74c3c;
      }
    </style>
  </head>

  <body>
    <div class="kalkulator">
      <div id="display" class="display">0</div>

      <div id="buttons" class="buttons">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-value="/">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-value="*">×</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-value="-">-</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="equal" data-value="=">=</button>
        <button class="operator" data-value="+">+</button>

        <button class="clear" data-value="C" style="grid-column: span 4">
          C
        </button>
      </div>
    </div>

    <script src="latihan-1.js"></script>
  </body>
</html>
